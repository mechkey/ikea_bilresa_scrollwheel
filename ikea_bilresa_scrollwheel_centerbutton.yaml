      default: ""
  
    button3_double_press_cover_action:
      name: "Button 3 – 2× Click – Cover Action"
      selector:
        select:
          options:
            - label: "Toggle"
              value: "toggle"
            - label: "Open"
              value: "open"
            - label: "Close"
              value: "close"
            - label: "Stop"
              value: "stop"
      default: "open"
  
    button3_triple_press_light:
      name: "Button 3 – 3× Click Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button3_triple_press_type:
      name: "Button 3 – 3× Click Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
            - label: "Blind / Cover (Open/Close)"
              value: "cover"
      default: "light"
  
    button3_triple_press_light_action:
      name: "Button 3 – 3× Click Action (Light)"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "brightness_100"
  
    button3_triple_press_scene:
      name: "Button 3 – 3× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button3_triple_press_cover:
      name: "Button 3 – 3× Click – Cover/Blind (optional)"
      selector:
        entity:
          domain: cover
      default: ""
  
    button3_triple_press_cover_action:
      name: "Button 3 – 3× Click – Cover Action"
      selector:
        select:
          options:
            - label: "Toggle"
              value: "toggle"
            - label: "Open"
              value: "open"
            - label: "Close"
              value: "close"
            - label: "Stop"
              value: "stop"
      default: "open"
  
    button3_hold_light:
      name: "Button 3 – Hold/Release Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button3_hold_direction:
      name: "Button 3 – Dim Direction when Holding"
      selector:
        select:
          options:
            - label: "Brighter (increase)"
              value: "brighter"
            - label: "Darker (decrease)"
              value: "darker"
      default: "brighter"
  
    button3_hold_brightness_step:
      name: "Button 3 – Brightness per Step (%)"
