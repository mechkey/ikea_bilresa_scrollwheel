              value: "open"
            - label: "Close"
              value: "close"
            - label: "Stop"
              value: "stop"
      default: "open"
  
    button3_double_press_light:
      name: "Button 3 – 2× Click Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button3_double_press_type:
      name: "Button 3 – 2× Click – Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
            - label: "Blind / Cover (Open/Close)"
              value: "cover"
      default: "light"
  
    button3_double_press_light_action:
      name: "Button 3 – 2× Click Action (Light)"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "brightness_50"
  
    button3_double_press_scene:
      name: "Button 3 – 2× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button3_double_press_cover:
      name: "Button 3 – 2× Click – Cover/Blind (optional)"
      selector:
