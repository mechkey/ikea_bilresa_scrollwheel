blueprint:
  name: "IKEA Bilresa – 3 Buttons"
  description: "3 independent buttons (1×/2×/3× click + hold-dimming per button) + Cover support"
  domain: automation

  input:
    # ════════════════════════════════════════════════════════════
    # BUTTON 1
    # ════════════════════════════════════════════════════════════
    button1_event_entity:
      name: "Button 1 – Event Entity"
      description: "Event Entity of Button 1"
      selector:
        entity:
          domain: event
  
    button1_single_press_light:
      name: "Button 1 – 1× Click Light"
      selector:
        entity:
          domain: light
      default: ""
  
    button1_single_press_action:
      name: "Button 1 – 1× Click Action"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "toggle"
  
    button1_double_press_light:
      name: "Button 1 – 2× Click Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button1_double_press_type:
      name: "Button 1 – 2× Click Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
      default: "light"
  
    button1_double_press_light_action:
      name: "Button 1 – 2× Click Action (Light)"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "brightness_50"
  
    button1_double_press_scene:
      name: "Button 1 – 2× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button1_triple_press_light:
      name: "Button 1 – 3× Click Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button1_triple_press_type:
      name: "Button 1 – 3× Click Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
      default: "light"
  
    button1_triple_press_light_action:
      name: "Button 1 – 3× Click Action (Light)"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "brightness_100"
  
    button1_triple_press_scene:
      name: "Button 1 – 3× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button1_hold_light:
      name: "Button 1 – Hold/Release Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button1_hold_direction:
      name: "Button 1 – Dim Direction when Holding"
      selector:
        select:
          options:
            - label: "Brighter (increase)"
              value: "brighter"
            - label: "Darker (decrease)"
              value: "darker"
      default: "brighter"
  
    button1_hold_brightness_step:
      name: "Button 1 – Brightness per Step (%)"
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"

    # ════════════════════════════════════════════════════════════
    # BUTTON 2
    # ════════════════════════════════════════════════════════════
    button2_event_entity:
      name: "Button 2 – Event Entity (optional)"
      selector:
        entity:
          domain: event
      default: ""
  
    button2_single_press_light:
      name: "Button 2 – 1× Click Light"
      selector:
        entity:
          domain: light
      default: ""
  
    button2_single_press_action:
      name: "Button 2 – 1× Click Action"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "toggle"
  
    button2_double_press_light:
      name: "Button 2 – 2× Click Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button2_double_press_type:
      name: "Button 2 – 2× Click Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
      default: "light"
  
    button2_double_press_light_action:
      name: "Button 2 – 2× Click Action (Light)"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "brightness_50"
  
    button2_double_press_scene:
      name: "Button 2 – 2× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button2_triple_press_light:
      name: "Button 2 – 3× Click Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button2_triple_press_type:
      name: "Button 2 – 3× Click Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
      default: "light"
  
    button2_triple_press_light_action:
      name: "Button 2 – 3× Click Action (Light)"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "brightness_100"
  
    button2_triple_press_scene:
      name: "Button 2 – 3× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button2_hold_light:
      name: "Button 2 – Hold/Release Light (optional)"
      selector:
        entity:
          domain: light
      default: ""
  
    button2_hold_direction:
      name: "Button 2 – Dim Direction when Holding"
      selector:
        select:
          options:
            - label: "Brighter (increase)"
              value: "brighter"
            - label: "Darker (decrease)"
              value: "darker"
      default: "brighter"
  
    button2_hold_brightness_step:
      name: "Button 2 – Brightness per Step (%)"
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"

    # ════════════════════════════════════════════════════════════
    # BUTTON 3 (with Cover Support)
    # ════════════════════════════════════════════════════════════
    button3_event_entity:
      name: "Button 3 – Event Entity (optional)"
      selector:
        entity:
          domain: event
      default: ""
  
    button3_single_press_light:
      name: "Button 3 – 1× Click Light"
      selector:
        entity:
          domain: light
      default: ""
  
    button3_single_press_type:
      name: "Button 3 – 1× Click – Action Type"
      selector:
        select:
          options:
            - label: "Light (Brightness/Toggle)"
              value: "light"
            - label: "Activate Scene"
              value: "scene"
            - label: "Blind / Cover (Open/Close)"
              value: "cover"
      default: "light"
  
    button3_single_press_action:
      name: "Button 3 – 1× Click Action"
      selector:
        select:
          options:
            - label: "Toggle (On/Off)"
              value: "toggle"
            - label: "Turn On"
              value: "turn_on"
            - label: "Turn Off"
              value: "turn_off"
            - label: "25% Brightness"
              value: "brightness_25"
            - label: "50% Brightness"
              value: "brightness_50"
            - label: "75% Brightness"
              value: "brightness_75"
            - label: "100% Brightness"
              value: "brightness_100"
      default: "toggle"
  
    button3_single_press_scene:
      name: "Button 3 – 1× Click Scene (optional)"
      selector:
        entity:
          domain: scene
      default: ""
  
    button3_single_press_cover:
      name: "Button 3 – 1× Click – Cover/Blind (optional)"
      selector:
